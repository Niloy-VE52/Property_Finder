services:
  # Backend Web Service
  - type: web
    name: magicproperty-backend
    env: python
    region: singapore # Change to your preferred region (e.g., oregon, frankfurt, ohio)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Render will prompt you for this value in the dashboard

  # Frontend Static Site
  - type: web
    name: magicproperty-frontend
    env: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Render will prompt you for this value. Enter: https://magicproperty-backend.onrender.com/api
